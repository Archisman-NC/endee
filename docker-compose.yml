services:
  # 1. Vector Database (Endee)
  endee-oss:
    image: endeeio/endee-server:latest
    container_name: endee-oss
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    volumes:
      - endee-data:/data
    restart: unless-stopped

  # 2. Redis (Queue Broker)
  redis:
    image: redis:latest
    container_name: redis-queue
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Streamlit Frontend
  repomind-app:
    build: .
    container_name: repomind-app
    ports:
      - "8501:8501"
    environment:
      - ENDEE_BASE_URL=http://endee-oss:8080/api/v1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
    depends_on:
      - endee-oss
      - redis
    restart: unless-stopped

  # 4. Celery Worker (Background Indexing)
  repomind-worker:
    build: .
    container_name: repomind-worker
    command: celery -A repomind.celery_app worker --loglevel=info
    environment:
      - ENDEE_BASE_URL=http://endee-oss:8080/api/v1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
    depends_on:
      - endee-oss
      - redis
    restart: unless-stopped

volumes:
  endee-data:
